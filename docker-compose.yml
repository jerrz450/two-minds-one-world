x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile.agent
  command: sh -c "python -u -m agents.service"
  env_file:
    - .env
    - .env.secrets
  volumes:
    - ./data:/app/data
    - repo_data:/repo
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    executor:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
      - .env.secrets
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twominds}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sandbox:
    build:
      context: ./executor
      dockerfile: Dockerfile.sandbox
    image: sandbox:latest
    command: echo "sandbox image ready"

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/data
      - repo_data:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/docs')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  agent_jordan:
    <<: *agent-base
    environment:
      AGENT_ID: ${JORDAN_ID}
      AGENT_QUEUE: ${JORDAN_ID}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME_JORDAN}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL_JORDAN}

  agent_marcus:
    <<: *agent-base
    environment:
      AGENT_ID: ${MARCUS_ID}
      AGENT_QUEUE: ${MARCUS_ID}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME_MARCUS}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL_MARCUS}

  agent_priya:
    <<: *agent-base
    environment:
      AGENT_ID: ${PRIYA_ID}
      AGENT_QUEUE: ${PRIYA_ID}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME_PRIYA}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL_PRIYA}

  agent_zoe:
    <<: *agent-base
    environment:
      AGENT_ID: ${ZOE_ID}
      AGENT_QUEUE: ${ZOE_ID}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME_ZOE}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL_ZOE}

  agent_devon:
    <<: *agent-base
    environment:
      AGENT_ID: ${DEVON_ID}
      AGENT_QUEUE: ${DEVON_ID}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME_DEVON}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL_DEVON}

  world:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: celery -A celery_app worker --loglevel=info -Q world,celery --concurrency=1
    env_file:
      - .env
      - .env.secrets
    environment:
      IS_WORLD_WORKER: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
      - .env.secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: python -m agents.orchestrator
    env_file:
      - .env
      - .env.secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  git-sync:
    image: alpine/git
    volumes:
        - repo_data:/repo
        - ./scripts/git-sync.sh:/git-sync.sh:ro
    env_file:
        - .env.secrets
    environment:
        - GIT_REPO=${GITHUB_REPO}
    entrypoint: sh /git-sync.sh
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  repo_data: